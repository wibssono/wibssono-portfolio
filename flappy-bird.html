<!DOCTYPE html>
<html lang="en">
<style>
    body {
        background-image:
            linear-gradient(rgba(62, 62, 62, 0.619), rgba(255, 255, 255, 0.8)),
            url('img/tulip_pattern.jpg');
        background-repeat: repeat;
        background-size: 500px;
    }

    .game-screen {
        border-radius: 20px;
        border-style: solid;
        border-width: 10px;
        border-color: pink;
        box-shadow: 6px 6px 10px rgba(0, 0, 0, 0.55);
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Project 001</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="game-title">
            <h1 style="text-shadow: 3px 3px 4px rgba(0, 0, 0, 0.55); color: pink;">
                GET YOUR PRESENTS
            </h1>
        </div>
        <div class="game-screen">
            <canvas id="game" width="300" height="500"></canvas>
            <p id="description" class="game-description">Press 'spacebar' or 'click' to begin</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
